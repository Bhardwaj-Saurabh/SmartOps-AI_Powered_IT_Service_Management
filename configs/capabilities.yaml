# Seed entries for the Capability Registry (collocated with SBCA in Phase 1).
# Agents also self-register on startup, but having a seed file means the
# registry has a sensible default state before any agent has booted.

capabilities:
  - name: incident_intake
    url: http://incident-intake-agent:8444
    version: 0.1.0
    skills:
      - submit_incident
      - check_duplicate

  - name: incident_classification
    url: http://classification-agent:8444
    version: 0.1.0
    skills:
      - incident_classification

  - name: priority_scoring
    url: http://priority-scorer:8444
    version: 0.1.0
    skills:
      - priority_scoring

  - name: incident_routing
    url: http://routing-agent:8444
    version: 0.1.0
    skills:
      - incident_routing

  - name: triage_incident
    url: http://triage-workflow-orchestrator:8444
    version: 0.1.0
    skills:
      - triage_incident

  - name: root_cause_analysis
    url: http://diagnostic-agent:8444
    version: 0.1.0
    skills:
      - root_cause_analysis

  - name: knowledge_search
    url: http://knowledge-search-agent:8444
    version: 0.1.0
    skills:
      - knowledge_search

  - name: resolve_incident
    url: http://resolution-workflow-orchestrator:8444
    version: 0.1.0
    skills:
      - resolve_incident

  - name: semantic.query_rule
    url: http://sbca:8444
    version: 0.1.0
    skills:
      - query_rule

  - name: capability_registry.register
    url: http://sbca:8444
    version: 0.1.0
    skills:
      - register
      - deregister
      - lookup
