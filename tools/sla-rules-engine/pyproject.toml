[project]
name = "tool-sla-rules-engine"
version = "0.1.0"
description = "Applies SLA pause/exclusion logic given a sequence of incident state transitions"
requires-python = ">=3.12"
dependencies = ["fastapi>=0.115", "uvicorn[standard]>=0.32", "pydantic>=2.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sla_rules_engine"]
