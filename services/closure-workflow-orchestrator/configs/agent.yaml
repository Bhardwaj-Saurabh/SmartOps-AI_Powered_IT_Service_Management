name: closure-workflow-orchestrator
version: 0.1.0                       # Stage 5a — Communication + SLA chained
pattern: chain
pattern_kind: workflow

oidc:
  client_id: agent-closure-orchestrator
  audience: agent-closure-orchestrator

a2a:
  port: 8444
  skills:
    - id: close_incident
      name: Close incident
      description: Notify stakeholders + record SLA snapshot (Stage 5a); + document + link to problem in Stage 5b

# Stage 5a chain. Stage 5b appends resolution_documenter + problem_linker.
chain:
  - capability: send_status_update
    skill: send_status_update
    step_label: closure.notify
    compose_inputs:
      incident:       "input.incident"
      classification: "input.classification"
      priority:       "input.priority"
      diagnosis:      "input.diagnosis"
      fix_result:     "input.fix_result"
      verification:   "input.verification"
      trigger:        "input.trigger"        # caller decides (resolution / escalation / state_change)
      current_state:  "input.current_state"

  - capability: calculate_sla_status
    skill: calculate_sla_status
    step_label: closure.sla
    compose_inputs:
      incident_id:        "input.incident.incident_id"
      priority:           "input.priority.priority"
      customer_tier:      "input.priority.service_tier"
      region:             "input.region"
      started_at_epoch:   "input.started_at_epoch"
      state_transitions:  "input.state_transitions"

capability_registry:
  register_on_startup: true
  deregister_on_shutdown: true
  registry_url: "${SBCA_URL:-http://sbca:8444}"

saga:
  enabled: false                     # closure flow is read-only — nothing to compensate
  compensations: []

audit:
  cat_fields: [chain_inputs, chain_outputs, failed_step_index]
  pst_fields: [duration_ms, chain_step_count, error_rate]

kpis:
  business:
    - closures_count
    - notifications_sent_count
    - sla_breach_at_close_count
  technical:
    - closure_total_latency_ms
    - per_step_latency_ms
    - downstream_a2a_error_rate

resilience:
  step_retry:   {attempts: 1, backoff: linear}
  saga:         compensate_on_failure
