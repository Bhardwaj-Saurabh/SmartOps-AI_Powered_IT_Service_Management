[project]
name = "tool-taxonomy-lookup"
version = "0.1.0"
description = "ITSM taxonomy lookup sidecar — validates category/subcategory/service against a versioned tree"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "pydantic>=2.9",
  "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/taxonomy_lookup"]
