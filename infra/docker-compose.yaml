      context: ..
      dockerfile: services/strategic-business-context-agent/Dockerfile
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: strategic-business-context-agent
      KEYCLOAK_REALM_URL: http://keycloak:8080/realms/smartops
      OIDC_AUDIENCE: agent-sbca
      SBCA_RULES_DIR: /app/configs/semantic-plane
      DEV_ALLOW_UNVERIFIED_JWT: "${DEV_ALLOW_UNVERIFIED_JWT:-false}"
    volumes:
      - ../configs/semantic-plane:/app/configs/semantic-plane:ro
    depends_on:
