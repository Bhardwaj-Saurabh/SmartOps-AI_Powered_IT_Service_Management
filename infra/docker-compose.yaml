# SmartOps DI AI Framework — local Compose stack.
#
# Boot: `docker compose -f infra/docker-compose.yaml up -d`
# Single internal network. No service exposes its primary port to the host
# unless it's a debug/dev surface (Keycloak admin, Qdrant UI). LiteLLM is
# strictly internal — see CLAUDE.md "LiteLLM Hardening".
#
# Resource limits are conservative; bump on a beefier host if needed.
services:

  # ───────────────────── platform services ─────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin-rotate-me}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: "8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/smartops-realm.json:ro
    ports:
      - "8081:8080"      # admin console — dev only; remove in any deployed env
    # Simple TCP-port check via bash /dev/tcp. The Keycloak UBI image has bash
    # and supports /dev/tcp. Targets the HTTP listener (8080) — once it's
    # accepting connections the realm is live enough for agents to fetch JWKS.
    # Generous start_period because first-boot realm import takes ~30s.
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G

  litellm:
    # CVE-2026-42208 (CISA KEV) requires v1.83.7+; pinned to v1.83.10-stable.
    # NEVER bump to :latest or :main — hook blocks it. See CLAUDE.md.
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:v1.83.10-stable}
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
      - /home/nonroot/.cache
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_MODE: PRODUCTION
      # Azure Foundry credentials — never exposed to agent containers
      AZURE_API_BASE: ${AZURE_FOUNDRY_ENDPOINT}
      AZURE_API_KEY: ${AZURE_FOUNDRY_API_KEY}
      AZURE_API_VERSION: ${AZURE_FOUNDRY_API_VERSION:-2024-10-21}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    depends_on:
      keycloak:
        condition: service_started
    # No host port mapping — internal only.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=2).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"      # REST — dev only, remove in deployed env
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otel/config.yaml:ro
      - cat-store:/var/log/cat
      - pst-store:/var/log/pst
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:13133/ >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ───────────────────── DI semantic plane ─────────────────────
  sbca:
