[project]
name = "tool-metrics-query-tool"
version = "0.1.0"
description = "Synthetic metric snapshots — returns CPU/memory/latency/error rate by service + time window"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "pydantic>=2.9",
  "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metrics_query_tool"]
