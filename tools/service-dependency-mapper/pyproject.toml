[project]
name = "tool-service-dependency-mapper"
version = "0.1.0"
description = "Returns the downstream/upstream service topology for an affected service (synthetic CMDB)"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "pydantic>=2.9",
  "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/service_dependency_mapper"]
