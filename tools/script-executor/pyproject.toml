[project]
name = "tool-script-executor"
version = "0.1.0"
description = "Synthetic runbook executor. Phase 1 simulates remediation steps — no real SSH/API calls."
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "pydantic>=2.9",
  "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/script_executor"]
