name: resolution-workflow-orchestrator
version: 0.1.0
pattern: chain                        # Anthropic; deterministic sequence of A2A calls
pattern_kind: workflow

oidc:
  client_id: agent-resolution-orchestrator
  audience: agent-resolution-orchestrator

a2a:
  port: 8444
  skills:
    - id: resolve_incident
      name: Resolve incident
      description: Chain Diagnostic + Knowledge Search (Stage 4a) into a single resolution result; +Fix/Verify with Saga in Stage 4b

# Capabilities this orchestrator chains. Stage 4b appends Automated Fix +
# Verification entries with saga compensations.
chain:
  - capability: root_cause_analysis
    skill: root_cause_analysis
    step_label: resolution.diagnose
    forward_field: null               # uses the orchestrator's caller payload
  - capability: knowledge_search
    skill: knowledge_search
    step_label: resolution.knowledge_search
    compose_inputs:
      # "input.<key>" references the caller's original triaged-incident payload.
      # "<step_idx>.<artifact_name>" references a prior step's artifact.
      incident:       "input.incident"
      classification: "input.classification"
      diagnosis:      "0.diagnosis"

capability_registry:
  register_on_startup: true
  deregister_on_shutdown: true
  registry_url: "${SBCA_URL:-http://sbca:8444}"

# Saga compensation table — populated in Stage 4b when Automated Fix is
# introduced. For Stage 4a both Diagnostic and Knowledge Search are
# read-only so there is nothing to compensate.
saga:
  enabled: false
  compensations: []

audit:
  cat_fields: [chain_inputs, chain_outputs, failed_step_index, saga_compensations]
  pst_fields: [duration_ms, chain_step_count, error_rate]

kpis:
  business:
    - resolved_incident_count
    - diagnose_success_rate
    - knowledge_articles_returned_avg
  technical:
    - resolution_total_latency_ms
    - per_step_latency_ms
    - downstream_a2a_error_rate

resilience:
  step_retry:   {attempts: 1, backoff: linear}
  saga:         compensate_on_failure
