[project]
name = "tool-knowledge-base-writer"
version = "0.1.0"
description = "Synthetic KB writer — in-memory store for Phase 1 articles + drafts"
requires-python = ">=3.12"
dependencies = ["fastapi>=0.115", "uvicorn[standard]>=0.32", "pydantic>=2.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/knowledge_base_writer"]
