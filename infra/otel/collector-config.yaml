# OpenTelemetry Collector — DI AI Framework §6.3 dual-pipeline split.
#
# Every span/log arrives with attribute `audit.type` ∈ {confidential, platform}.
# Two parallel pipelines using the contrib `filter` processor:
#
#   CAT  (confidential audit trail) — keeps audit.type=confidential only.
#                                     Full content, file sink, 30-day rotation.
#   PST  (platform support trail)   — drops audit.type=confidential.
#                                     Keeps platform + un-tagged spans (FastAPI
#                                     auto-spans). Redaction processor strips
#                                     known-sensitive attrs from this stream.
#
# Exporters are configurable — swap file sinks for Elasticsearch / encrypted
# vault later without touching agent code (framework §6.4).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert
      - key: framework
        value: di-ai
        action: upsert

  # Keep ONLY audit.type=confidential. The filter drops everything that doesn't
  # match the predicate; we want to drop everything that's not confidential.
  filter/cat:
    error_mode: ignore
    traces:
      span:
        - 'attributes["audit.type"] != "confidential"'
    logs:
      log_record:
        - 'attributes["audit.type"] != "confidential"'

  # Drop audit.type=confidential. Everything else (platform + missing tag, like
  # FastAPI's auto-spans) flows through to the platform pipeline.
  filter/pst:
    error_mode: ignore
    traces:
      span:
        - 'attributes["audit.type"] == "confidential"'
    logs:
      log_record:
        - 'attributes["audit.type"] == "confidential"'

  # Strip known-sensitive attributes from anything on the PST pipeline.
  # CAT keeps them. Conservative list; extend per agent as needed.
  attributes/redact_pst:
    actions:
      - {key: incident.reporter,     action: delete}
      - {key: incident.full_content, action: delete}
      - {key: message.body,          action: delete}
      - {key: user.email,            action: delete}
      - {key: tool.payload,          action: delete}
      - {key: llm_prompt,            action: delete}
      - {key: llm_response,          action: delete}
      - {key: prompt,                action: delete}
      - {key: response,              action: delete}

exporters:
  # Phase 1 — file sinks. Phase 2 swaps to encrypted-vault (CAT) and
  # Elasticsearch (PST) without code changes.
  file/cat_traces:
    path: /var/log/cat/traces.jsonl
    rotation: {max_megabytes: 100, max_days: 30, max_backups: 5}
  file/cat_logs:
    path: /var/log/cat/logs.jsonl
    rotation: {max_megabytes: 100, max_days: 30, max_backups: 5}
  file/pst_traces:
    path: /var/log/pst/traces.jsonl
    rotation: {max_megabytes: 100, max_days: 7, max_backups: 3}
  file/pst_logs:
    path: /var/log/pst/logs.jsonl
    rotation: {max_megabytes: 100, max_days: 7, max_backups: 3}

  # Stdout for `docker compose logs -f otel-collector` inspection.
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces/cat:
      receivers: [otlp]
      processors: [batch, resource, filter/cat]
      exporters: [file/cat_traces]
    traces/pst:
      receivers: [otlp]
      processors: [batch, resource, filter/pst, attributes/redact_pst]
      exporters: [file/pst_traces, debug]
    logs/cat:
      receivers: [otlp]
      processors: [batch, resource, filter/cat]
      exporters: [file/cat_logs]
    logs/pst:
      receivers: [otlp]
      processors: [batch, resource, filter/pst, attributes/redact_pst]
      exporters: [file/pst_logs, debug]
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug]
