[project]
name = "tool-log-aggregator-connector"
version = "0.1.0"
description = "Synthetic log search (Phase 1) — returns canned log entries by service + time window"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "pydantic>=2.9",
  "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/log_aggregator_connector"]
