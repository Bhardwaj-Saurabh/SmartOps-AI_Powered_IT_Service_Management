      KEYCLOAK_REALM_URL: http://keycloak:8080/realms/smartops
      OIDC_CLIENT_ID: agent-knowledge-search
      OIDC_CLIENT_SECRET: ${KNOWLEDGE_SEARCH_CLIENT_SECRET:-bootstrap-me}
      OIDC_AUDIENCE: agent-knowledge-search
      AI_GATEWAY_URL: http://litellm:4000
      SBCA_URL: http://sbca:8444
      KNOWLEDGE_BASE_URL: http://knowledge-base-connector:9001
      EMBEDDING_SEARCH_URL: http://embedding-search-tool:9002
      DEV_ALLOW_UNVERIFIED_JWT: "${DEV_ALLOW_UNVERIFIED_JWT:-false}"
    depends_on:
      keycloak: {condition: service_started}
      litellm: {condition: service_healthy}
      sbca: {condition: service_healthy}
      knowledge-base-connector: {condition: service_healthy}
      embedding-search-tool: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8444/health', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources: {limits: {memory: 768M, cpus: "1.0"}}

  # ─────────────── second service-layer agent ─────────────────
  resolution-workflow-orchestrator:
    build:
      context: ..
      dockerfile: services/resolution-workflow-orchestrator/Dockerfile
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: resolution-workflow-orchestrator
      KEYCLOAK_REALM_URL: http://keycloak:8080/realms/smartops
      OIDC_CLIENT_ID: agent-resolution-orchestrator
      OIDC_CLIENT_SECRET: ${RESOLUTION_ORCHESTRATOR_CLIENT_SECRET:-bootstrap-me}
      OIDC_AUDIENCE: agent-resolution-orchestrator
      SBCA_URL: http://sbca:8444
      DEV_ALLOW_UNVERIFIED_JWT: "${DEV_ALLOW_UNVERIFIED_JWT:-false}"
    ports:
      - "8464:8444"      # dev only — orchestrator's A2A endpoint
    depends_on:
      keycloak: {condition: service_started}
      sbca: {condition: service_healthy}
      diagnostic-agent: {condition: service_healthy}
      knowledge-search-agent: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8444/health', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources: {limits: {memory: 512M, cpus: "0.5"}}

volumes:
  qdrant-data:
  redis-data:
  cat-store:
  pst-store:
