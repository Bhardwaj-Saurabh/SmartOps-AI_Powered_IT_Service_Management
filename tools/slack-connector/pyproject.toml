[project]
name = "tool-slack-connector"
version = "0.1.0"
description = "Slack connector sidecar — normalises Slack message payloads to canonical incident input"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/slack_connector"]
